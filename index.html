<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="counter-display" id="counter">0</div>
        <div class="button-container">
            <button class="increase-btn" onclick="increaseCounter()">Increase</button>
            <button class="init-btn" onclick="initializeCounter()">Initialization</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
